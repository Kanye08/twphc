services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: producthub_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - producthub
    depends_on:
      db:
        condition: service_healthy

  webserver:
    image: nginx:alpine
    container_name: producthub_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - producthub
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: producthub_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_assessment
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - producthub
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  producthub:
    driver: bridge

volumes:
  db_data:
    driver: local